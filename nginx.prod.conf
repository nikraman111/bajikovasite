# Продакшен: замените example.com на свой домен
# Скопируйте в /etc/nginx/sites-available/bajikovasite
# и поменяйте root на путь к папке на хостинге
server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/bajikovasite;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статика с кэшем
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
